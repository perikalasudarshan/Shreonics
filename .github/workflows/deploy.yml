name: Deploy to GitHub Pages

# grant pages write permissions to the workflow
permissions:
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Using a personal access token avoids permission issues that sometimes
          # occur with the default GITHUB_TOKEN, especially for first-time
          # branch creation.  Create a token with `repo` scope and store it as
          # the repository secret `GH_PAGES_TOKEN`.
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./dist
